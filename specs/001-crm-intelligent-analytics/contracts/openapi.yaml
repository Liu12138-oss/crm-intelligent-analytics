    ContractReviewReviewBasis:
      type: object
      description: >
        合同审核结果的追溯依据。`AI_HYBRID` 表示已执行 AI + 确定性校验混合审核；
        `DETERMINISTIC_ONLY` 表示当前结果仍停留在规则快审或降级快审；若存在 `degradationReason`，表示 AI 不可用或失败导致未进入完整混合审核；
        `BLOCKED` 表示任务被阻断，尚未形成正式审核结果。
      required:
        - packCode
        - packVersion
        - packChecksum
        - packChecksumSummary
        - modelProfile
        - executionMode
      properties:
        packCode:
          type: string
          description: 当前命中的 skill pack 编码
        packVersion:
          type: string
          description: 当前审核标准版本号
        packChecksum:
          type: string
          description: 当前 skill pack 完整校验值
        packChecksumSummary:
          type: string
          description: 便于页面与日志展示的校验摘要
        modelProfile:
          type: string
          description: 当前审核使用的模型档位或模型配置名
        executionMode:
          $ref: '#/components/schemas/ContractReviewExecutionMode'
        degradationReason:
          type: string
          description: 降级快审或阻断原因；当执行模式为 `DETERMINISTIC_ONLY` 且实际发生 AI 降级，或执行模式为 `BLOCKED` 时建议返回
