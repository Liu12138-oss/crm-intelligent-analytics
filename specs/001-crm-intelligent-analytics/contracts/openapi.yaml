    wecomSignatureAuth:
      type: apiKey
      in: header
      name: X-Wecom-Signature
  parameters:
    QueryId:
      in: path
      name: queryId
      required: true
      schema:
        type: string
      description: 分析请求 ID
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
      description: 查询会话 ID
    HistoryId:
      in: path
      name: historyId
      required: true
      schema:
        type: string
      description: 最近查询记录 ID
    TemplateId:
      in: path
      name: templateId
      required: true
      schema:
        type: string
      description: 查询模板 ID
    ContractId:
      in: path
      name: contractId
      required: true
      schema:
        type: string
      description: CRM 源合同 ID
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
      description: 合同审核任务 ID
    ArtifactId:
      in: path
      name: artifactId
      required: true
      schema:
        type: string
      description: 合同审核产物 ID
    DailyReportId:
      in: path
      name: reportId
      required: true
      schema:
        type: string
      description: 销售日报 ID
  schemas:
    AuthPasswordLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        corpId:
          type: string
    AuthSessionResponse:
      type: object
      required: [authenticated, sessionId, source, expiresAt, user]
      properties:
        authenticated:
          type: boolean
        sessionId:
          type: string
        source:
          type: string
          enum: [password-login, wecom-scan]
        expiresAt:
          type: string
          format: date-time
        user:
          type: object
          required: [id, name, roleNames, channels, organizationIds, departmentIds]
          properties:
            id:
              type: string
            name:
              type: string
            roleNames:
              type: array
              items:
                type: string
            channels:
              type: array
              items:
                type: string
            organizationIds:
              type: array
              items:
                type: string
            departmentIds:
              type: array
              items:
                type: string
    WecomLoginInitiateResponse:
      type: object
      required: [enabled, state, authorizeUrl]
      properties:
        enabled:
          type: boolean
        state:
          type: string
        authorizeUrl:
          type: string
        widget:
          type: object
          properties:
            appId:
              type: string
            agentId:
              type: string
            redirectUri:
              type: string
            state:
              type: string
            scope:
              type: string
        reason:
          type: string
    WecomLoginExchangeRequest:
      type: object
      required: [state]
      properties:
        code:
          type: string
        authCode:
          type: string
        state:
          type: string
    WecomLoginBindRequiredResponse:
      type: object
      required: [bindRequired, bindToken, prompt]
      properties:
        bindRequired:
          type: boolean
          enum: [true]
        bindToken:
          type: string
        wecomUserName:
          type: string
        prompt:
          type: string
    WecomIncomingMessageRequest:
      type: object
      description: >
        兼容当前本地联调简化报文与企业微信官方风格文本消息。
        一期只支持文本问数，不支持图片、文件或语音消息直接进入正式分析链路。
      properties:
        externalConversationId:
          type: string
          description: 简化联调报文中的外部会话标识
        senderId:
          type: string
          description: 简化联调报文中的发送者标识
        messageId:
          type: string
          description: 简化联调报文中的消息唯一标识
        messageText:
          type: string
          minLength: 1
          maxLength: 1000
          description: 简化联调报文中的文本内容
        msgid:
          type: string
          description: 企业微信官方文本消息的唯一标识
        chattype:
          type: string
          enum: [single, group]
        chatid:
          type: string
        msgtype:
          type: string
          enum: [text, image, mixed, voice, file]
        from:
          type: object
          properties:
            userid:
              type: string
        text:
          type: object
          properties:
 

              type: string
        followUpToSessionId:
          type: string
        sentAt:
          type: string
          format: date-time
    WecomIncomingMessageResponse:
      type: object
      required: [receiptId, status, acceptedAt]
      properties:
        receiptId:
          type: string
        sessionId:
          type: string
        queryId:
          type: string
        status:
          type: string
          description: 企业微信消息当前处理结果；跟进写回相关状态仅在进入受控跟进流程后返回，主题型跟进入口在模板收集中通常返回 `DAILY_REPORT_PROMPTED`，CRM 创建相关状态仅在受控新增客户/商机流程中返回。
          enum: [RETURNED, CLARIFICATION_REQUIRED, QUEUED, BLOCKED, EXPLAINED, DEGRADED, OPPORTUNITY_LOOKUP_RETURNED, ENTITY_LOOKUP_LIST_RETURNED, ENTITY_LOOKUP_DETAIL_RETURNED, FOLLOW_UP_WRITEBACK_PENDING_CONFIRMATION, FOLLOW_UP_WRITEBACK_AWAITING_CONTENT_CONFIRMATION, FOLLOW_UP_WRITEBACK_SUCCEEDED, FOLLOW_UP_WRITEBACK_CANCELLED, FOLLOW_UP_WRITEBACK_FAILED, FOLLOW_UP_SHARE_PENDING_CONFIRMATION, FOLLOW_UP_SHARE_SUCCEEDED, FOLLOW_UP_SHARE_CANCELLED, WECOM_CRM_CREATE_COLLECTING, WECOM_CRM_CREATE_AWAITING_CONFIRMATION, WECOM_CRM_CREATE_SUCCEEDED, WECOM_CRM_CREATE_CANCELLED, WECOM_CRM_CREATE_FAILED]
        acceptedAt:
          type: string
          format: date-time
        deduplicated:
          type: boolean
        queueNotice:
          type: string
        clarificationPrompt:
          type: string
        deliveryStatus:
          type: string
          enum: [PENDING, SENT, RETRYING, FAILED, SKIPPED]
        deliveredBlockCount:
          type: integer
          minimum: 0
        followUpWriteback:
          description: 仅在进入受控跟进写回确认阶段时返回；主题型模板收集阶段、普通问数或拒绝场景不返回该字段。进入该阶段前，服务端已经同时完成 `wecom.followup.writeback` 动作权限校验，以及负责人 / 协作人 / 递归上级链对象级授权校验。
          $ref: '#/components/schemas/WecomFollowUpWritebackPayload'
        crmCreate:
          description: 仅在企业微信受控新增客户或受控新增商机流程中返回；普通问数、拒绝或跟进写回场景不返回该字段。
          $ref: '#/components/schemas/WecomCrmCreatePayload'
