                $ref: '#/components/schemas/DailyReportRecord'
        '400':
          description: 日报尚未完成收口或请求参数无效
        '404':
          description: 日报不存在
  /api/v1/daily-reports/audit:
    get:
      tags: [DailyReport]
      summary: 查询日报审计快照
      operationId: listDailyReportAuditSnapshots
      parameters:
        - in: query
          name: businessDate
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DailyReportStatus'
      responses:
        '200':
          description: 日报审计快照列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyReportAuditSnapshotItem'
  /api/v1/daily-reports/summary-batches:
    get:
      tags: [DailyReport]
      summary: 查询负责人日报汇总批次
      operationId: listDailyReportSummaryBatches
      responses:
        '200':
          description: 汇总批次列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyReportSummaryBatchRecord'
  /api/v1/daily-reports/cron/reminders:
    post:
      tags: [DailyReport]
      summary: 执行 22:00 CRM 日报源数据检查与个人确认/催报任务
      operationId: runDailyReportReminderSweep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyReportCronRequest'
      responses:
        '200':
          description: 22 点任务已执行；有源数据时返回自动生成的个人日报，无源数据时仅发送本人催报提醒
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyReportRecord'
  /api/v1/daily-reports/cron/close:
    post:
      tags: [DailyReport]
      summary: 执行日报封账任务
      operationId: runDailyReportClosureSweep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyReportCronRequest'
      responses:
        '200':
          description: 封账任务已执行
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyReportRecord'
  /api/v1/daily-reports/cron/summaries:
    post:
      tags: [DailyReport]
      summary: 执行次日 08:00 负责人日报汇总任务
      operationId: runDailyReportSummarySweep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyReportSummaryCronRequest'
      responses:
        '200':
          description: 团队汇总任务已执行，并按负责人返回日报汇总批次
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReportSummaryBatchRecord'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
