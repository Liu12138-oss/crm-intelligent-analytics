openapi: 3.1.0
info:
  title: CRM智能分析系统一期接口
  version: 1.2.0
  description: >
    面向一期企业微信 AI 问数、Web 智能分析工作台与智能合同审核模块的接口契约，
    覆盖自然语言问数、企业微信消息接入、查询模板、最近查询、结果查询、
    合同审核任务、审核产物下载、导出控制、治理配置、审计检索与销售日报编排。
servers:
  - url: https://crm-analysis.internal.example.com
    description: 内网生产环境示例地址
security:
  - cookieAuth: []
tags:
  - name: Auth
    description: 登录认证、当前会话与企业微信扫码登录
  - name: Analysis
    description: 分析问数与结果查询
  - name: QueryAsset
    description: 常用查询与最近查询
  - name: Opportunity
    description: 公司名称直查商机与受控机会查询
  - name: CrmWrite
    description: 受控 CRM 写入口子，用于后续机器人或内部调用
  - name: WecomBot
    description: 企业微信机器人消息接入与会话查询
  - name: Session
    description: 会话连接治理与保活
  - name: Export
    description: 结果导出控制
  - name: ContractReview
    description: 智能合同审核任务、结果详情与产物下载
  - name: Governance
    description: 治理配置与模板管理
  - name: Audit
    description: 审计检索
  - name: DailyReport
    description: 销售日报编排、确认、提醒与汇总
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 使用 CRM 账号密码登录并建立本地会话
      operationId: loginByPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasswordLoginRequest'
      responses:
        '201':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: 账号密码错误或未绑定有效 CRM 用户
  /api/v1/auth/session:
    get:
      tags: [Auth]
      summary: 查询当前登录会话
      operationId: getCurrentAuthSession
      responses:
        '200':
          description: 当前登录态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: 当前未登录或会话已失效
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 退出当前登录会话
      operationId: logoutCurrentSession
      responses:
        '200':
          description: 已退出登录
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
  /api/v1/auth/wecom/initiate:
    get:
      tags: [Auth]
      summary: 发起企业微信扫码登录
      operationId: initiateWecomLogin
      responses:
        '200':
          description: 返回扫码授权地址
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WecomLoginInitiateResponse'
  /api/v1/auth/wecom/callback:
    get:
      tags: [Auth]
      summary: 处理企业微信扫码登录回调
      operationId: handleWecomLoginCallback
      parameters:
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: senderId
          schema:
            type: string
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: error
          schema:
            type: string
      responses:
        '302':
          description: 已处理扫码结果并跳转到 Web 登录页或工作台
  /api/v1/auth/wecom/exchange:
    post:
      tags: [Auth]
      summary: 处理企业微信网页登录后的前端换票请求
      operationId: exchangeWecomLoginCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WecomLoginExchangeRequest'
      responses:
        '201':
          description: 换票成功，或返回需要补录绑定信息的提示
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthSessionResponse'
                  - $ref: '#/components/schemas/WecomLoginBindRequiredResponse'
        '401':
          description: 企业微信登录状态校验失败或认证接口调用失败
  /api/v1/wecom/messages:
    post:
      tags: [WecomBot]
      summary: 接收企业微信机器人消息
      operationId: receiveWecomMessage
      security:
        - wecomSignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WecomIncomingMessageRequest'
      responses:
        '202':
          description: 消息已接收，系统开始处理或继续当前会话
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WecomIncomingMessageResponse'
        '403':
          description: 当前用户无权使用企业微信问数能力
        '409':
          description: 会话状态冲突或当前请求需要排队
  /api/v1/wecom/sessions/{sessionId}:
    get:
      tags: [WecomBot, Session]
      summary: 查询企业微信会话状态
      operationId: getWecomSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 当前会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySessionResponse'
        '404':
          description: 会话不存在
  /api/v1/wecom/sessions/{sessionId}/heartbeat:
    post:
      tags: [Session]
      summary: 上报企业微信会话心跳
      operationId: reportWecomSessionHeartbeat
      security:
        - wecomSignatureAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionHeartbeatRequest'
      responses:
        '200':
          description: 心跳已记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHeartbeatResponse'
        '404':
          description: 会话不存在
  /api/v1/analysis/capabilities:
    get:
      tags: [Analysis]
      summary: 获取当前用户可用的分析能力
      operationId: getAnalysisCapabilities
      responses:
        '200':
          description: 当前用户的分析能力范围
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisCapabilitiesResponse'
  /api/v2/opportunities/by_name:
    get:
      tags: [Opportunity]
      summary: 按名称查询商机列表
      operationId: listOpportunitiesByName
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 5
        - in: query
          name: custom_field_name
          required: false
          schema:
            type: string
            enum: [title]
            default: title
      responses:
        '200':
          description: 名称命中的商机查询结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityLookupResponse'
        '400':
          description: 未提供公司名称
        '401':
          description: 当前未登录或会话已失效
        '403':
          description: 当前账号无权查看该范围商机
  /api/v1/crm/customers:
    post:
      tags: [CrmWrite]
      summary: 新增客户口子
      operationId: createCrmCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCrmCustomerRequest'
      responses:
        '201':
          description: 客户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCrmCustomerResponse'
        '400':
          description: 必填字段缺失、CRM 默认值未配置或自定义字段映射缺失
        '401':
          description: 当前未登录或会话中缺少 CRM access token
        '503':
          description: CRM Open API 不可用或创建失败
  /api/v1/crm/opportunities:
    post:
      tags: [CrmWrite]
      summary: 新增商机口子
      operationId: createCrmOpportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCrmOpportunityRequest'
      responses:
        '201':
          description: 商机创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCrmOpportunityResponse'
        '400':
          description: 必填字段缺失、关联产品为空或自定义字段映射缺失
        '401':
          description: 当前未登录或会话中缺少 CRM access token
        '503':
          description: CRM Open API 不可用或创建失败
  /api/v1/analysis/templates:
    get:
      tags: [QueryAsset]
      summary: 获取当前用户可见的常用查询
      operationId: listVisibleQueryTemplates
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [mine, others, all]
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: ownerUserId
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [usage_desc, display_order]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 当前用户可见的常用查询列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryTemplateListResponse'
  /api/v1/analysis/templates/facets:
    get:
      tags: [QueryAsset]
      summary: 获取常用查询标签选项
      operationId: listQueryTemplateFacets
      responses:
        '200':
          description: 当前用户可见的标签
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryTemplateFacetResponse'
  /api/v1/analysis/templates/{templateId}/copy-to-mine:
    post:
      tags: [QueryAsset]
      summary: 将其它模板复制为我的个人模板副本
      operationId: copyQueryTemplateToMine
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '201':
          description: 已创建个人模板副本
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryTemplateResponse'
  /api/v1/analysis/queries/{queryId}/templates:
    post:
      tags: [QueryAsset]
      summary: 将已成功返回的自由问数结果保存为查询模板
      operationId: saveAnalysisQueryAsTemplate
      parameters:
        - in: path
          name: queryId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveQueryAsTemplateRequest'
      responses:
        '201':
          description: 已保存为查询模板
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryTemplateResponse'
  /api/v1/analysis/templates/{templateId}/execute:
    post:
      tags: [QueryAsset]
      summary: 直接执行固定 SQL 查询模板
      operationId: executeQueryTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteQueryTemplateRequest'
      responses:
        '201':
          description: 模板执行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteQueryTemplateResponse'
  /api/v1/analysis/histories:
    get:
      tags: [QueryAsset]
      summary: 获取当前用户最近查询列表
      operationId: listRecentQueries
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: 最近查询分页列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecentQueryListResponse'
  /api/v1/analysis/histories/{historyId}/rerun:
    post:
      tags: [QueryAsset]
      summary: 按当前权限重新运行最近查询
      operationId: rerunRecentQuery
      parameters:
        - $ref: '#/components/parameters/HistoryId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerunRecentQueryRequest'
      responses:
        '201':
          description: 最近查询已重新执行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisQueryResponse'
        '403':
          description: 当前用户无权重新执行该记录
        '404':
          description: 最近查询记录不存在
  /api/v1/analysis/queries:
    post:
      tags: [Analysis]
      summary: 提交自然语言分析请求
      operationId: createAnalysisQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnalysisQueryRequest'
      responses:
        '201':
          description: 已创建分析请求或返回补问提示
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisQueryResponse'
        '400':
          description: 请求格式不合法或问题超出当前支持范围
        '403':
          description: 当前用户无权使用分析能力
  /api/v1/analysis/queries/{queryId}:
    get:
      tags: [Analysis]
      summary: 查询分析请求详情与结果
      operationId: getAnalysisQuery
      parameters:
        - $ref: '#/components/parameters/QueryId'
      responses:
        '200':
          description: 分析结果详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisQueryDetailResponse'
        '404':
          description: 请求不存在
  /api/v1/analysis/queries/{queryId}/exports:
    post:
      tags: [Export]
      summary: 导出指定分析结果
      operationId: createAnalysisExport
      parameters:
        - $ref: '#/components/parameters/QueryId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '201':
          description: 导出任务已创建并完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResponse'
        '403':
          description: 用户无导出权限或导出超限
        '409':
          description: 分析结果尚不可导出
  /api/v1/contract-reviews/contracts/pending-approval:
    get:
      tags: [ContractReview]
      summary: 获取当前用户可见的待 1 级审批合同列表
      operationId: listPendingApprovalContracts
      responses:
        '200':
          description: 待 1 级审批合同列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractReviewSourceContractListResponse'
        '401':
          description: 当前未登录或会话已失效
        '403':
          description: 当前用户无权访问合同审核工作台
  /api/v1/contract-reviews/contracts/{contractId}:
    get:
      tags: [ContractReview]
      summary: 获取指定待 1 级审批合同的 CRM 快照详情
      operationId: getPendingApprovalContractDetail
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          description: 合同快照详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractReviewSourceContractDetail'
        '401':
          description: 当前未登录或会话已失效
        '403':
          description: 当前用户无权查看该合同
        '404':
          description: 合同不存在或不在当前待审批范围内
  /api/v1/contract-reviews/contracts/{contractId}/tasks:
    post:
      tags: [ContractReview]
      summary: 按 CRM 合同 ID 创建审核任务
      operationId: createContractReviewTaskFromSourceContract
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '201':
          description: 审核任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractReviewCreateTaskResponse'
        '401':
          description: 当前未登录或会话已失效
        '403':
          description: 当前用户无权发起审核或无权访问该合同
        '404':
          description: 合同不存在或不在当前待审批范围内
  /api/v1/contract-reviews/tasks:
    get:
      tags: [ContractReview]
      summary: 获取当前用户可见的最近合同审核任务
      operationId: listContractReviewTasks
      responses:
        '200':
          description: 最近合同审核任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractReviewTaskListResponse'
        '401':
          description: 当前未登录或会话已失效
    post:
      tags: [ContractReview]
      summary: 上传本地合同并创建审核任务（兼容补录入口）
      operationId: createContractReviewTask
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 待审核的 `.docx` 合同文件
      responses:
        '201':
          description: 审核任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractReviewCreateTaskResponse'
        '400':
          description: 文件类型、大小或结构校验失败
        '401':
          description: 当前未登录或会话已失效
  /api/v1/contract-reviews/tasks/{taskId}:
    get:
      tags: [ContractReview]
      summary: 获取指定合同审核任务详情
      operationId: getContractReviewTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 审核任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractReviewTaskDetailResponse'
        '403':
          description: 当前无权查看该审核任务
        '404':
          description: 审核任务不存在
  /api/v1/contract-reviews/tasks/{taskId}/artifacts/{artifactId}/download:
    get:
      tags: [ContractReview]
      summary: 下载指定合同审核产物
      operationId: downloadContractReviewArtifact
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: 产物文件流
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: 当前产物尚未生成完成或生成失败
        '403':
          description: 当前无权下载该审核产物
        '404':
          description: 审核任务或产物不存在
  /api/v1/governance/policies/current:
    get:
      tags: [Governance]
      summary: 获取当前生效的治理策略
      operationId: getCurrentPolicy
      responses:
        '200':
          description: 当前治理策略
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicyResponse'
    put:
      tags: [Governance]
      summary: 更新当前治理策略
      operationId: updateCurrentPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccessPolicyRequest'
      responses:
        '200':
          description: 策略更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicyResponse'
        '400':
          description: 策略内容不合法
        '403':
          description: 当前用户不是管理员
  /api/v1/governance/permissions/overview:
    get:
      tags: [Governance]
      summary: 获取权限中心顶部摘要
      operationId: getAccessGovernanceOverview
      responses:
        '200':
          description: 权限中心摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGovernanceOverviewResponse'
        '403':
          description: 当前用户无权访问权限中心
  /api/v1/governance/application-super-admin-policy:
    get:
      tags: [Governance]
      summary: 获取应用超级管理员授权策略
      operationId: getApplicationSuperAdminPolicy
      responses:
        '200':
          description: 应用超级管理员授权策略
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSuperAdminPolicyResponse'
        '403':
          description: 当前用户无权访问权限中心
    put:
      tags: [Governance]
      summary: 更新应用超级管理员授权策略
      operationId: updateApplicationSuperAdminPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationSuperAdminPolicyRequest'
      responses:
        '200':
          description: 应用超级管理员授权策略更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSuperAdminPolicyResponse'
        '400':
          description: 请求参数不合法
        '403':
          description: 当前用户无权访问权限中心
  /api/v1/governance/analysis-scope-policy:
    get:
      tags: [Governance]
      summary: 获取应用超级管理员授权策略（旧分析全量查询兼容接口）
      operationId: getAnalysisScopePolicy
      deprecated: true
      responses:
        '200':
          description: 兼容返回应用超级管理员授权策略；历史全量查询名单会迁移为用户级授权主体
          content:
            application/json:
              schema:
