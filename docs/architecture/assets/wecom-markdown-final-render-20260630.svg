<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1180" viewBox="0 0 820 1180">
  <defs>
    <linearGradient id="背景渐变" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#EFF7F4"/>
      <stop offset="100%" stop-color="#DDEAE5"/>
    </linearGradient>
    <linearGradient id="气泡渐变" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FCFA"/>
    </linearGradient>
    <filter id="柔和阴影" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#173B35" flood-opacity="0.13"/>
    </filter>
    <style>
      .主字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173B35; }
      .副字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #58706A; }
      .浅字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #78908A; }
      .白字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .数值 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0E766A; font-weight: 700; }
      .风险 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #B45309; }
      .小标题 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173B35; font-weight: 700; }
      .代码 { font-family: "SFMono-Regular", "Menlo", monospace; fill: #35534C; }
    </style>
  </defs>

  <rect width="820" height="1180" rx="36" fill="url(#背景渐变)"/>

  <g transform="translate(58 38)">
    <rect width="704" height="1104" rx="48" fill="#101B18" filter="url(#柔和阴影)"/>
    <rect x="22" y="24" width="660" height="1056" rx="36" fill="#F1F4F3"/>

    <rect x="22" y="24" width="660" height="84" rx="36" fill="#F8FAF9"/>
    <text x="350" y="57" text-anchor="middle" class="主字" font-size="18" font-weight="700">渠道 CRM 系统机器人</text>
    <text x="350" y="84" text-anchor="middle" class="浅字" font-size="13">长连接会话中，首条答复优先使用 Markdown</text>
    <circle cx="72" cy="67" r="15" fill="#D8E2DE"/>
    <rect x="65" y="59" width="14" height="2" rx="1" fill="#173B35"/>
    <rect x="65" y="66" width="21" height="2" rx="1" fill="#173B35"/>
    <rect x="650" y="56" width="20" height="20" rx="5" fill="#E2ECE8"/>
    <circle cx="656" cy="62" r="2.4" fill="#58706A"/>
    <circle cx="664" cy="62" r="2.4" fill="#58706A"/>
    <circle cx="656" cy="70" r="2.4" fill="#58706A"/>
    <circle cx="664" cy="70" r="2.4" fill="#58706A"/>

    <g transform="translate(78 136)">
      <rect x="226" y="0" width="350" height="72" rx="18" fill="#D9F6EC"/>
      <text x="548" y="29" text-anchor="end" class="主字" font-size="17" font-weight="700">本月渠道经营情况怎么样？</text>
      <text x="548" y="53" text-anchor="end" class="副字" font-size="14">请给我看结论、风险和下一步动作</text>
      <path d="M576 30 L596 40 L576 50 Z" fill="#D9F6EC"/>
      <circle cx="626" cy="37" r="22" fill="#0E766A"/>
      <text x="626" y="44" text-anchor="middle" class="白字" font-size="18" font-weight="700">我</text>
    </g>

    <g transform="translate(58 238)">
      <circle cx="28" cy="30" r="28" fill="#0E766A"/>
      <text x="28" y="39" text-anchor="middle" class="白字" font-size="22" font-weight="700">智</text>
      <path d="M72 34 L48 48 L72 62 Z" fill="url(#气泡渐变)"/>
      <rect x="70" y="0" width="548" height="728" rx="24" fill="url(#气泡渐变)" stroke="#D8E2DE"/>

      <text x="98" y="42" class="小标题" font-size="24">联软 CRM｜经营总览看板卡</text>
      <rect x="98" y="62" width="130" height="26" rx="13" fill="#E3F6EF"/>
      <text x="163" y="81" text-anchor="middle" class="数值" font-size="14">Markdown 消息</text>
      <rect x="238" y="62" width="130" height="26" rx="13" fill="#EEF3F1"/>
      <text x="303" y="81" text-anchor="middle" class="副字" font-size="14">可流式回复</text>
      <rect x="378" y="62" width="166" height="26" rx="13" fill="#FFF4E8"/>
      <text x="461" y="81" text-anchor="middle" class="风险" font-size="14">不发送 HTML 原文</text>

      <line x1="98" y1="110" x2="590" y2="110" stroke="#D8E2DE"/>
      <text x="98" y="143" class="副字" font-size="16">【问题复述】本月渠道经营情况怎么样？</text>
      <text x="98" y="171" class="副字" font-size="16">【数据口径】当前登录用户权限，本月，CRM OpenAPI 实时数据。</text>
      <text x="98" y="199" class="副字" font-size="16">【结论先行】经营推进仍处在商机和报价驱动阶段，订单沉淀不足。</text>

      <rect x="98" y="224" width="492" height="98" rx="18" fill="#F0FAF6" stroke="#CDE9DE"/>
      <text x="120" y="256" class="小标题" font-size="17">核心指标</text>
      <text x="120" y="291" class="副字" font-size="15">渠道商</text>
      <text x="176" y="291" class="数值" font-size="20">173 家</text>
      <text x="286" y="291" class="副字" font-size="15">活跃渠道</text>
      <text x="368" y="291" class="数值" font-size="20">28 家</text>
      <text x="468" y="291" class="副字" font-size="15">报备</text>
      <text x="512" y="291" class="数值" font-size="20">120 条</text>

      <text x="98" y="358" class="小标题" font-size="18">漏斗趋势</text>
      <g transform="translate(98 376)">
        <rect width="492" height="86" rx="18" fill="#FFFFFF" stroke="#E0E8E4"/>
        <rect x="20" y="24" width="102" height="30" rx="15" fill="#D6F2E9"/>
        <rect x="142" y="24" width="90" height="30" rx="15" fill="#C7EBDD"/>
        <rect x="252" y="24" width="76" height="30" rx="15" fill="#F8E7C9"/>
        <rect x="348" y="24" width="62" height="30" rx="15" fill="#F6D6C8"/>
        <text x="71" y="45" text-anchor="middle" class="主字" font-size="14">报备 120</text>
        <text x="187" y="45" text-anchor="middle" class="主字" font-size="14">商机 85</text>
        <text x="290" y="45" text-anchor="middle" class="主字" font-size="14">报价 42</text>
        <text x="379" y="45" text-anchor="middle" class="主字" font-size="14">订单 0</text>
        <path d="M122 39 L142 39 M232 39 L252 39 M328 39 L348 39" stroke="#8CA29B" stroke-width="3" stroke-linecap="round"/>
        <text x="20" y="71" class="浅字" font-size="13">最大断点：报价到订单，需要优先核对订单同步和成交状态。</text>
      </g>

      <text x="98" y="500" class="小标题" font-size="18">渠道与风险</text>
      <rect x="98" y="516" width="492" height="116" rx="18" fill="#FFFFFF" stroke="#E0E8E4"/>
      <text x="120" y="548" class="副字" font-size="15">1. 头部渠道贡献集中，前三渠道贡献约 72.5%。</text>
      <text x="120" y="579" class="副字" font-size="15">2. 山东区报备和商机领先，但报价推进节奏需要复核。</text>
      <text x="120" y="610" class="风险" font-size="15">3. 当前不能把商机或报价解释为真实成交。</text>

      <text x="98" y="670" class="小标题" font-size="18">建议追问</text>
      <g transform="translate(98 686)">
        <rect width="120" height="34" rx="17" fill="#173B35"/>
        <rect x="132" width="132" height="34" rx="17" fill="#173B35"/>
        <rect x="276" width="154" height="34" rx="17" fill="#173B35"/>
        <text x="60" y="23" text-anchor="middle" class="白字" font-size="14">看区域拆分</text>
        <text x="198" y="23" text-anchor="middle" class="白字" font-size="14">看报价转订单</text>
        <text x="353" y="23" text-anchor="middle" class="白字" font-size="14">生成月会摘要</text>
      </g>
    </g>

    <g transform="translate(58 1000)">
      <rect width="616" height="54" rx="18" fill="#FFFFFF" stroke="#D8E2DE"/>
      <text x="24" y="34" class="代码" font-size="15">发送层：msgtype=markdown；流式场景使用 replyStream；完整 HTML 只作为后续入口。</text>
    </g>
  </g>
</svg>
