<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="900" viewBox="0 0 1220 900">
  <defs>
    <linearGradient id="大背景" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F5F8F6"/>
      <stop offset="100%" stop-color="#DCEBE5"/>
    </linearGradient>
    <linearGradient id="看板头" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#173B35"/>
      <stop offset="100%" stop-color="#0E766A"/>
    </linearGradient>
    <filter id="柔光阴影" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#173B35" flood-opacity="0.14"/>
    </filter>
    <style>
      .主字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173B35; }
      .副字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #58706A; }
      .浅字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7A918B; }
      .白字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .数值 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0E766A; font-weight: 700; }
      .警示 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #B45309; }
      .标题 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173B35; font-weight: 700; }
      .代码 { font-family: "SFMono-Regular", "Menlo", monospace; fill: #35534C; }
    </style>
  </defs>

  <rect width="1220" height="900" rx="38" fill="url(#大背景)"/>

  <text x="58" y="62" class="标题" font-size="30">企微图片卡片展现终态</text>
  <text x="58" y="94" class="副字" font-size="17">用于第三段类 HTML 首屏：把完整看板中最关键的图表、排行和风险清单渲染成图片后发送。</text>

  <g transform="translate(54 128)">
    <rect width="1112" height="704" rx="34" fill="#FFFFFF" stroke="#D8E2DE" filter="url(#柔光阴影)"/>
    <rect x="24" y="24" width="1064" height="78" rx="24" fill="url(#看板头)"/>
    <text x="52" y="64" class="白字" font-size="25" font-weight="700">联软 CRM｜经营总览 HTML 首屏图片</text>
    <text x="52" y="88" class="白字" font-size="14">当前权限｜本月｜OpenAPI 实时数据｜图片由服务端渲染生成</text>
    <rect x="888" y="46" width="174" height="34" rx="17" fill="#FFFFFF" opacity="0.16"/>
    <text x="975" y="68" text-anchor="middle" class="白字" font-size="14">发送为 image 消息</text>

    <g transform="translate(42 132)">
      <rect width="236" height="92" rx="22" fill="#F1FAF6" stroke="#D6EAE2"/>
      <text x="24" y="34" class="副字" font-size="15">渠道商</text>
      <text x="24" y="68" class="数值" font-size="30">173 家</text>
      <rect x="260" width="236" height="92" rx="22" fill="#F1FAF6" stroke="#D6EAE2"/>
      <text x="284" y="34" class="副字" font-size="15">活跃渠道</text>
      <text x="284" y="68" class="数值" font-size="30">28 家</text>
      <rect x="520" width="236" height="92" rx="22" fill="#F1FAF6" stroke="#D6EAE2"/>
      <text x="544" y="34" class="副字" font-size="15">商机金额</text>
      <text x="544" y="68" class="数值" font-size="30">350.00 万</text>
      <rect x="780" width="236" height="92" rx="22" fill="#FFF7ED" stroke="#F3D9B8"/>
      <text x="804" y="34" class="副字" font-size="15">订单金额</text>
      <text x="804" y="68" class="警示" font-size="30" font-weight="700">0.00 万</text>
    </g>

    <g transform="translate(42 252)">
      <rect width="500" height="250" rx="24" fill="#FBFDFC" stroke="#DDE7E3"/>
      <text x="24" y="36" class="标题" font-size="19">业务漏斗和转化断点</text>
      <text x="24" y="62" class="浅字" font-size="14">报备、商机、报价、订单四段同屏展示</text>
      <g transform="translate(34 92)">
        <polygon points="0,0 420,0 378,38 42,38" fill="#D6F2E9"/>
        <polygon points="42,50 378,50 332,88 88,88" fill="#C7EBDD"/>
        <polygon points="88,100 332,100 286,138 134,138" fill="#F8E7C9"/>
        <polygon points="134,150 286,150 250,188 170,188" fill="#F6D6C8"/>
        <text x="210" y="25" text-anchor="middle" class="主字" font-size="15">报备 120 条</text>
        <text x="210" y="75" text-anchor="middle" class="主字" font-size="15">商机 85 条｜350.00 万</text>
        <text x="210" y="125" text-anchor="middle" class="主字" font-size="15">报价 42 条｜200.00 万</text>
        <text x="210" y="175" text-anchor="middle" class="警示" font-size="15" font-weight="700">订单 0 条｜断点最高</text>
      </g>
    </g>

    <g transform="translate(568 252)">
      <rect width="496" height="250" rx="24" fill="#FBFDFC" stroke="#DDE7E3"/>
      <text x="24" y="36" class="标题" font-size="19">渠道贡献 TOP5</text>
      <text x="24" y="62" class="浅字" font-size="14">无订单时按商机和报价前置口径展示</text>
      <g transform="translate(24 92)">
        <text x="0" y="18" class="副字" font-size="14">A 渠道</text>
        <rect x="86" y="4" width="330" height="18" rx="9" fill="#0E766A"/>
        <text x="430" y="18" class="主字" font-size="14">80 万</text>
        <text x="0" y="52" class="副字" font-size="14">B 渠道</text>
        <rect x="86" y="38" width="250" height="18" rx="9" fill="#38A795"/>
        <text x="430" y="52" class="主字" font-size="14">60 万</text>
        <text x="0" y="86" class="副字" font-size="14">C 渠道</text>
        <rect x="86" y="72" width="196" height="18" rx="9" fill="#73C8BA"/>
        <text x="430" y="86" class="主字" font-size="14">47 万</text>
        <text x="0" y="120" class="副字" font-size="14">D 渠道</text>
        <rect x="86" y="106" width="142" height="18" rx="9" fill="#B7DDD4"/>
        <text x="430" y="120" class="主字" font-size="14">34 万</text>
        <text x="0" y="154" class="副字" font-size="14">E 渠道</text>
        <rect x="86" y="140" width="104" height="18" rx="9" fill="#D8E9E4"/>
        <text x="430" y="154" class="主字" font-size="14">25 万</text>
      </g>
    </g>

    <g transform="translate(42 532)">
      <rect width="500" height="126" rx="24" fill="#FFF7ED" stroke="#F3D9B8"/>
      <text x="24" y="36" class="标题" font-size="19">风险和经营判断</text>
      <text x="24" y="68" class="警示" font-size="15">1. 报价到订单断点明显，需要核查订单同步和合同状态。</text>
      <text x="24" y="96" class="警示" font-size="15">2. 头部渠道集中度偏高，长尾渠道需要激活。</text>
    </g>

    <g transform="translate(568 532)">
      <rect width="496" height="126" rx="24" fill="#F1FAF6" stroke="#D6EAE2"/>
      <text x="24" y="36" class="标题" font-size="19">下一步动作</text>
      <text x="24" y="68" class="副字" font-size="15">看区域拆分｜看报价转订单｜看商机风险清单</text>
      <text x="24" y="96" class="副字" font-size="15">图片下方仍可继续用 Markdown 给出追问入口。</text>
    </g>
  </g>

  <g transform="translate(54 850)">
    <rect width="1112" height="34" rx="17" fill="#DDEAE5"/>
    <text x="556" y="23" text-anchor="middle" class="代码" font-size="14">生成链路：HTML 或 SVG 首屏模板 → 服务端渲染 PNG → 上传临时素材 → msgtype=image 发送到企微会话。</text>
  </g>
</svg>
