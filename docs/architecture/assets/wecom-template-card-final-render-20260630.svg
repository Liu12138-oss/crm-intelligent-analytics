<svg xmlns="http://www.w3.org/2000/svg" width="960" height="920" viewBox="0 0 960 920">
  <defs>
    <linearGradient id="页面背景" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F3F8F6"/>
      <stop offset="100%" stop-color="#E1ECE8"/>
    </linearGradient>
    <linearGradient id="卡片头" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0E766A"/>
      <stop offset="100%" stop-color="#173B35"/>
    </linearGradient>
    <filter id="卡片阴影" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#173B35" flood-opacity="0.14"/>
    </filter>
    <style>
      .主字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173B35; }
      .副字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #58706A; }
      .浅字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7A918B; }
      .白字 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .数值 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0E766A; font-weight: 700; }
      .警示 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #B45309; }
      .代码 { font-family: "SFMono-Regular", "Menlo", monospace; fill: #35534C; }
      .标题 { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173B35; font-weight: 700; }
    </style>
  </defs>

  <rect width="960" height="920" rx="38" fill="url(#页面背景)"/>

  <text x="58" y="64" class="标题" font-size="30">企微模板卡片展现终态</text>
  <text x="58" y="96" class="副字" font-size="17">用于第二段摘要入口：以 text_notice 卡片承载核心指标、风险提示和完整报告入口。</text>

  <g transform="translate(56 132)">
    <rect width="454" height="712" rx="34" fill="#101B18" filter="url(#卡片阴影)"/>
    <rect x="18" y="22" width="418" height="668" rx="26" fill="#F2F4F3"/>
    <rect x="18" y="22" width="418" height="66" rx="26" fill="#FFFFFF"/>
    <text x="227" y="62" text-anchor="middle" class="主字" font-size="18" font-weight="700">渠道 CRM 系统机器人</text>

    <g transform="translate(42 116)">
      <circle cx="24" cy="26" r="24" fill="#0E766A"/>
      <text x="24" y="34" text-anchor="middle" class="白字" font-size="19" font-weight="700">智</text>
      <path d="M68 28 L48 42 L68 56 Z" fill="#FFFFFF"/>
      <rect x="66" y="0" width="324" height="462" rx="22" fill="#FFFFFF" stroke="#DDE7E3"/>

      <rect x="66" y="0" width="324" height="82" rx="22" fill="url(#卡片头)"/>
      <text x="92" y="34" class="白字" font-size="14">CRM智能助手</text>
      <text x="92" y="62" class="白字" font-size="23" font-weight="700">经营总览看板</text>
      <rect x="306" y="22" width="60" height="28" rx="14" fill="#FFFFFF" opacity="0.18"/>
      <text x="336" y="41" text-anchor="middle" class="白字" font-size="13">实时</text>

      <text x="92" y="118" class="浅字" font-size="13">当前权限｜本月｜OpenAPI 实时数据</text>
      <text x="92" y="150" class="主字" font-size="16" font-weight="700">核心判断</text>
      <text x="92" y="176" class="副字" font-size="14">商机和报价推进活跃，订单沉淀不足。</text>

      <rect x="92" y="202" width="248" height="82" rx="16" fill="#F0FAF6" stroke="#CAE8DD"/>
      <text x="112" y="233" class="数值" font-size="30">350.00 万</text>
      <text x="112" y="263" class="副字" font-size="14">商机金额，当前主判断口径</text>

      <line x1="92" y1="312" x2="340" y2="312" stroke="#E1EAE6"/>
      <text x="92" y="340" class="副字" font-size="14">报备</text>
      <text x="340" y="340" text-anchor="end" class="主字" font-size="15" font-weight="700">120 条</text>
      <text x="92" y="374" class="副字" font-size="14">报价金额</text>
      <text x="340" y="374" text-anchor="end" class="主字" font-size="15" font-weight="700">200.00 万</text>
      <text x="92" y="408" class="副字" font-size="14">最大风险</text>
      <text x="340" y="408" text-anchor="end" class="警示" font-size="15" font-weight="700">报价到订单断点</text>

      <rect x="92" y="428" width="248" height="42" rx="21" fill="#173B35"/>
      <text x="216" y="455" text-anchor="middle" class="白字" font-size="15" font-weight="700">查看完整 HTML 看板</text>
    </g>
  </g>

  <g transform="translate(548 156)">
    <rect width="354" height="636" rx="28" fill="#FFFFFF" stroke="#D8E2DE" filter="url(#卡片阴影)"/>
    <text x="28" y="44" class="标题" font-size="22">字段映射和展现规则</text>
    <text x="28" y="78" class="副字" font-size="15">模板卡片不是长篇正文，只放最需要一眼看到的 3 到 6 项。</text>

    <g transform="translate(28 114)">
      <rect width="298" height="76" rx="18" fill="#F3FAF7" stroke="#D6EAE2"/>
      <text x="18" y="31" class="代码" font-size="14">source.desc</text>
      <text x="18" y="56" class="副字" font-size="14">来源：CRM智能助手，标识答复可信来源。</text>
    </g>

    <g transform="translate(28 206)">
      <rect width="298" height="76" rx="18" fill="#F8FBFA" stroke="#DDE7E3"/>
      <text x="18" y="31" class="代码" font-size="14">main_title.title</text>
      <text x="18" y="56" class="副字" font-size="14">主标题：经营总览、漏斗诊断、风险清单等。</text>
    </g>

    <g transform="translate(28 298)">
      <rect width="298" height="92" rx="18" fill="#FFF7ED" stroke="#F3D9B8"/>
      <text x="18" y="31" class="代码" font-size="14">emphasis_content</text>
      <text x="18" y="56" class="副字" font-size="14">突出一个主指标：金额、风险数、转化率或到期数。</text>
      <text x="18" y="78" class="警示" font-size="13">不能把报价金额误写为订单金额。</text>
    </g>

    <g transform="translate(28 406)">
      <rect width="298" height="102" rx="18" fill="#F8FBFA" stroke="#DDE7E3"/>
      <text x="18" y="31" class="代码" font-size="14">horizontal_content_list</text>
      <text x="18" y="56" class="副字" font-size="14">横向明细：报备、报价、风险、口径说明。</text>
      <text x="18" y="80" class="副字" font-size="14">保持短字段，避免超长截断。</text>
    </g>

    <g transform="translate(28 524)">
      <rect width="298" height="78" rx="18" fill="#173B35"/>
      <text x="18" y="31" class="白字" font-size="14" font-weight="700">按钮行为</text>
      <text x="18" y="56" class="白字" font-size="14">跳转完整报告入口，或触发继续追问。</text>
    </g>
  </g>

  <g transform="translate(56 866)">
    <rect width="846" height="34" rx="17" fill="#DDEAE5"/>
    <text x="423" y="23" text-anchor="middle" class="代码" font-size="14">发送层：msgtype=template_card；推荐 card_type=text_notice；用于摘要入口，不替代 Markdown 主答复。</text>
  </g>
</svg>
