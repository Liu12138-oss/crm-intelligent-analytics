upstream crm_analytics_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

log_format crm_analytics_timing '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" '
    'request_id=$request_id request_time=$request_time '
    'upstream_response_time=$upstream_response_time '
    'upstream_connect_time=$upstream_connect_time upstream_status=$upstream_status';

server {
    listen 80;
    server_name analytics.company.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name analytics.company.com;

    # 说明：
    # 1. 请替换为正式证书路径。
    # 2. 若证书由统一网关或负载均衡终止，可删除本机 SSL 配置并仅保留内网 HTTP。
    ssl_certificate     /etc/nginx/ssl/analytics.company.com.crt;
    ssl_certificate_key /etc/nginx/ssl/analytics.company.com.key;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /srv/crm-intelligent-analytics/current/frontend/dist;
    index index.html;
    access_log /var/log/nginx/crm-intelligent-analytics.access.log crm_analytics_timing;

    # 合同审核上传默认 10 MB，这里留 20 MB 余量，避免网关先于应用拦截。
    client_max_body_size 20m;

    # 当前后端没有独立 /health 接口；如后续补齐，可在这里单独转发。
    location /api/ {
        proxy_pass http://crm_analytics_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # 前端页面若统一挂在 /insight 下，接口也可同时走 /insight/api/*；
    # 这里先改写回后端现有的 /api/* 路径，避免要求 NestJS 跟着改全局前缀。
    location /insight/api/ {
        rewrite ^/insight(/api/.*)$ $1 break;
        proxy_pass http://crm_analytics_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # 统一把不带尾斜杠的入口收敛到带尾斜杠版本，避免相对资源路径解析不一致。
    location = /insight {
        return 301 /insight/;
    }

    # SPA 入口页必须每次刷新都重新校验，避免浏览器继续使用旧的 index.html，
    # 从而引用上一个版本的 hash bundle，导致“线上已发布但界面还是旧的”。
    location = /insight/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        alias /srv/crm-intelligent-analytics/current/frontend/dist/index.html;
    }

    # 构建产物文件名自带 hash，可安全长缓存，减少重复下载。
    location /insight/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        alias /srv/crm-intelligent-analytics/current/frontend/dist/assets/;
        try_files $uri =404;
    }

    # SPA 子路径部署示例：页面入口与静态资源统一挂到 /insight/ 下。
    location /insight/ {
        alias /srv/crm-intelligent-analytics/current/frontend/dist/;
        try_files $uri $uri/ /insight/index.html;
    }
}
